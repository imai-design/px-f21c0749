<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,'Hiragino Sans','Noto Sans JP',system-ui,sans-serif;background:#07090E}
  .wrap{min-height:100%;display:grid;place-items:center;padding:24px;background:radial-gradient(900px 500px at 50% -10%,#14181f,#07090E 60%)}
  .card{width:100%;max-width:360px;background:#151A23;border:1px solid #2A323F;border-radius:20px;padding:28px 22px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .lock{width:54px;height:54px;border-radius:14px;display:grid;place-items:center;margin:0 auto 16px;background:linear-gradient(135deg,#7C5CFF,#00D98B)}
  h1{color:#F5F7FA;font-size:18px;font-weight:800;text-align:center;margin:0 0 6px}
  p{color:#9AA5B5;font-size:12.5px;text-align:center;margin:0 0 20px;line-height:1.6}
  .pin{display:flex;gap:10px;justify-content:center;margin-bottom:4px}
  input{width:100%;background:#0B0E14;border:1px solid #2A323F;border-radius:12px;padding:14px;color:#F5F7FA;font-size:22px;letter-spacing:.5em;text-align:center;outline:none;font-variant-numeric:tabular-nums}
  input:focus{border-color:#00D98B}
  button{width:100%;margin-top:14px;background:#00D98B;color:#07090E;font-weight:800;font-size:15px;border:0;border-radius:12px;padding:13px;cursor:pointer;transition:transform .15s}
  button:active{transform:scale(.98)}
  button:disabled{background:#1E2530;color:#66707E;cursor:default}
  .err{color:#FF4D4F;font-size:12.5px;text-align:center;margin-top:12px;min-height:16px}
  .foot{color:#66707E;font-size:11px;text-align:center;margin-top:16px}
</style>
</head>

  function b64(s){return Uint8Array.from(atob(s),function(c){return c.charCodeAt(0)})}
  var FRAG=(location.hash||'').replace(/^#/,'');
  async function unlock(pin){
    var enc=new TextEncoder();
    var km=await crypto.subtle.importKey('raw',enc.encode(pin+':'+FRAG),'PBKDF2',false,['deriveKey']);
